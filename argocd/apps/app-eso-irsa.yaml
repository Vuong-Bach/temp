# ArgoCD App: ESO - Auth via IRSA (IAM Role for Service Account)
# ClusterSecretStore + ExternalSecret cho w10/db/password
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso-irsa
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/Vuong-Bach/temp.git
    path: app-eso-irsa
    targetRevision: dev
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
