# ArgoCD App: ESO - Auth via Sealed Secrets (credentials encrypted in git)
# SealedSecret → K8s Secret → SecretStore → ExternalSecret → app-config-secret
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso-sealedsecret
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/Vuong-Bach/temp.git
    path: app-eso-sealedsecret
    targetRevision: dev
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
