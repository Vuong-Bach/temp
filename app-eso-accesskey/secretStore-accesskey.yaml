# Auth 2: Static AWS Access Key / Secret Key
# Namespace-scoped: chỉ dùng được trong namespace "demo"
# Yêu cầu: tạo K8s Secret "aws-credentials" trong namespace demo TRƯỚC khi sync
#   kubectl create secret generic aws-credentials \
#     --from-literal=access-key-id=AKIAXXXXXXXX \
#     --from-literal=secret-access-key=xxxxxxxxxx \
#     -n demo
# Xem app-eso/aws-credentials.yaml.example để biết format
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager-accesskey
  namespace: demo
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key-id
            namespace: demo
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
            namespace: demo
