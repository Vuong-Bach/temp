# ExternalSecret: w10/db/password → K8s Secret "db-secret" trong namespace demo
# Dùng ClusterSecretStore IRSA (không cần credentials trong namespace)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-secret
  namespace: demo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-irsa
    kind: ClusterSecretStore
  target:
    name: db-secret
    creationPolicy: Owner
  data:
  - secretKey: DB_PASSWORD
    remoteRef:
      key: w10/db/password
      property: DB_PASSWORD
  - secretKey: DB_USER
    remoteRef:
      key: w10/db/password
      property: DB_USER
