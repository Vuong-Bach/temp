# ExternalSecret: w10/db/password → K8s Secret "db-secret" trong namespace demo
# NOTE: IRSA chỉ hoạt động trên EKS thật — dùng SecretStore accesskey cho local
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-secret
  namespace: demo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-accesskey
    kind: SecretStore
  target:
    name: db-secret
    creationPolicy: Owner
  data:
  - secretKey: DB_PASSWORD
    remoteRef:
      key: w10/db/password
      property: DB_PASSWORD
  - secretKey: DB_USER
    remoteRef:
      key: w10/db/password
      property: DB_USER
