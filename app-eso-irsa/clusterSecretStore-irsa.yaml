# Auth 1: IRSA (IAM Role for Service Account)
# ESO service account được annotate với IAM role ARN trong k8s-eso.yaml
# IAM role cần có policy: secretsmanager:GetSecretValue, secretsmanager:DescribeSecret
# Cluster-scoped: ExternalSecret ở bất kỳ namespace nào đều dùng được
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager-irsa
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
